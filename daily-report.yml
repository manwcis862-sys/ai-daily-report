name: AI Daily Report

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Report mode (morning/evening)'
        required: false
        default: 'evening'

jobs:
  morning-report:
    if: github.event.schedule == '0 1 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Morning Report
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          REPORT_MODE: morning
        run: python report.py
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: morning-report-${{ github.run_number }}
          path: ai-report-*.txt

  evening-report:
    if: github.event.schedule == '0 11 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'morning')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Evening Report
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          REPORT_MODE: evening
        run: python report.py
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: evening-report-${{ github.run_number }}
          path: ai-report-*.txt
